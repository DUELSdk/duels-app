<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DUEL — Hi-Fi v2</title>
<link rel="stylesheet" href="hifi/tokens.css" />
<style>
  html, body, #root { height: 100%; }
  body { background: #efece4; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#efece4">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#efece4"/>
    <text x="600" y="470" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="280" text-anchor="middle" fill="#0d0d0d" letter-spacing="-10">DUEL.</text>
    <rect x="220" y="540" width="760" height="2" fill="#0d0d0d"/>
    <text x="600" y="600" font-family="ui-monospace, monospace" font-size="22" text-anchor="middle" fill="#807c74" letter-spacing="6">BROADCAST · BUNKER · 1V1</text>
    <circle cx="320" cy="595" r="8" fill="#ef0000"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hifi/design-canvas.jsx"></script>
<script type="text/babel" src="hifi/tweaks-panel.jsx"></script>
<script type="text/babel" src="hifi/primitives.jsx"></script>
<script type="text/babel" src="hifi/screen-landing.jsx"></script>
<script type="text/babel" src="hifi/screen-match.jsx"></script>
<script type="text/babel" src="hifi/screen-mid.jsx"></script>
<script type="text/babel" src="hifi/screen-tournaments.jsx"></script>

<script type="text/babel" data-presets="env,react">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "alarm": "#ea0000",
  "showMobile": true
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(DEFAULTS);

  React.useEffect(() => {
    const r = parseInt(tweaks.alarm.slice(1,3), 16);
    const g = parseInt(tweaks.alarm.slice(3,5), 16);
    const b = parseInt(tweaks.alarm.slice(5,7), 16);
    document.documentElement.style.setProperty('--alarm', tweaks.alarm);
    document.documentElement.style.setProperty('--alarm-hot', tweaks.alarm);
    document.documentElement.style.setProperty('--alarm-soft', `rgba(${r},${g},${b},0.10)`);
  }, [tweaks.alarm]);

  const Block = ({ id, title, subtitle, hifi, Desktop, Mobile, dW = 1440, dH = 900 }) => (
    <DCSection id={id} title={title} subtitle={subtitle}>
      <DCArtboard id={`${id}-d`} label={`Desktop${hifi ? ' · HI-FI' : ''}`} width={dW} height={dH}>
        <Desktop />
      </DCArtboard>
      {tweaks.showMobile && (
        <DCArtboard id={`${id}-m`} label="Mobile" width={390} height={844}>
          <Mobile />
        </DCArtboard>
      )}
    </DCSection>
  );

  return (
    <>
      <DesignCanvas
        title="DUEL — Hi-Fi v2"
        subtitle="Broadcast booth + Match bunker. Anonymous. No ELO. No chips. Just rooms, timers, action."
      >
        <Block id="landing"  title="01 · LANDING — HI-FI"   subtitle="Broadcast front door. Standings, fixtures, news, animated ticker." hifi
          Desktop={LandingDesktop}  Mobile={LandingMobile}  dW={1440} dH={2400} />
        <Block id="library"  title="02 · LIBRARY — mid-fi"  subtitle="Three games. Live counters per row. Settled-today as a rhythm signal."
          Desktop={LibraryDesktop}  Mobile={LibraryMobile}  dW={1440} dH={900} />
        <Block id="detail"   title="03 · CARD DUEL — mid-fi" subtitle="Stake rooms preview, three numbered frames, played-round example."
          Desktop={DetailDesktop}   Mobile={DetailMobile}   dW={1440} dH={1100} />
        <Block id="lobby"    title="04 · LOBBY — mid-fi"     subtitle="Six stake rooms with live + wait. Custom-stake input. Pot math."
          Desktop={LobbyDesktop}    Mobile={LobbyMobile}    dW={1440} dH={1100} />
        <Block id="match"    title="05 · MATCH — HI-FI"      subtitle="Bunker. Anonymous opp. Mega timer. Live action feed replaces the stat rail." hifi
          Desktop={MatchDesktop}    Mobile={MatchMobile}    dW={1440} dH={900} />
        <Block id="tourneys" title="06 · TOURNAMENTS — HI-FI" subtitle="Schedule of every fight on the card. Marquee, tonight, tomorrow, weekly." hifi
          Desktop={TournamentsDesktop} Mobile={TournamentsMobile} dW={1440} dH={2600} />
        <Block id="tdetail"  title="07 · TOURNAMENT DETAIL — HI-FI" subtitle="Single tournament. Pot, bracket, seated list, prize split. Sealed until start." hifi
          Desktop={TournamentDetailDesktop} Mobile={TournamentDetailMobile} dW={1440} dH={2000} />
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Alarm color">
          <TweakColor
            label="Match-mode red"
            value={tweaks.alarm}
            onChange={(v) => setTweak('alarm', v)}
            options={['#ef0000', '#dc2626', '#ff4d00', '#e6005c']}
          />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakToggle
            label="Show mobile artboards"
            value={tweaks.showMobile}
            onChange={(v) => setTweak('showMobile', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
