<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShipDuel — DUEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060608;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --border-dim: rgba(255,255,255,0.06);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.50);
      --text-tertiary: rgba(255,255,255,0.28);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.14);
      --amber-border: rgba(245,158,11,0.35);
      --amber-glow: rgba(245,158,11,0.12);
      --amber-sunk: rgba(245,158,11,0.28);
      --cell: 44px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 52px;
      padding: 0 40px;
      border-bottom: 1px solid var(--border-dim);
      background: rgba(0,0,0,0.5);
      position: relative;
    }

    .player {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .player.right { align-items: flex-end; }

    .player-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      line-height: 1;
    }

    .player-name.dim { color: var(--text-secondary); }

    .player-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    .match-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .round-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.12em;
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .timer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--amber);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .timer-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.10em;
    }

    .phantom-pill {
      position: absolute;
      top: 50%;
      right: 40px;
      transform: translateY(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text-tertiary);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 3px 10px;
      text-transform: uppercase;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 40px;
      gap: 24px;
    }

    /* ── GRIDS ── */
    .grids-row {
      display: flex;
      align-items: flex-start;
      gap: 56px;
    }

    .grid-section { display: flex; flex-direction: column; gap: 10px; }

    .grid-section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    .grid-wrap { display: flex; }

    /* row labels column */
    .rlabels {
      display: flex;
      flex-direction: column;
      padding-top: 20px; /* skip col-labels row */
    }

    .rlabel {
      width: 18px;
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-tertiary);
    }

    /* col labels + grid */
    .grid-col { display: flex; flex-direction: column; }

    .clabels { display: flex; }

    .clabel {
      width: var(--cell);
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-tertiary);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, var(--cell));
      grid-template-rows: repeat(8, var(--cell));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 3px;
      overflow: hidden;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border-right: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.1s;
    }

    .cell:nth-child(8n) { border-right: none; }
    .cell:nth-last-child(-n+8) { border-bottom: none; }

    /* ── CELL STATES ── */

    /* Ship (your waters) */
    .cell.ship {
      background: var(--amber-dim);
      border-color: var(--amber-border);
    }

    /* Ship that was hit */
    .cell.ship.hit {
      background: rgba(245,158,11,0.22);
    }

    /* Sunk ship */
    .cell.sunk {
      background: var(--amber-sunk);
      border-color: rgba(245,158,11,0.55);
    }

    /* Hit on opponent grid */
    .cell.hit-mark {
      background: rgba(245,158,11,0.10);
    }

    /* Targeted cell */
    .cell.targeted {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.38) !important;
    }

    /* Hit dot (opponent grid) */
    .hit-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber), 0 0 14px rgba(245,158,11,0.35);
    }

    /* Miss dot */
    .miss-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
    }

    /* Sunk cross */
    .sunk-x {
      width: 12px;
      height: 12px;
      position: relative;
    }

    .sunk-x::before, .sunk-x::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 1.5px;
      background: rgba(245,158,11,0.9);
      top: 50%;
      left: 0;
    }

    .sunk-x::before { transform: translateY(-50%) rotate(45deg); }
    .sunk-x::after  { transform: translateY(-50%) rotate(-45deg); }

    /* Target crosshair + pulse */
    .target-reticle {
      position: relative;
      width: 14px;
      height: 14px;
      z-index: 1;
    }

    .target-reticle::before, .target-reticle::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.7);
    }

    .target-reticle::before {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
    }

    .target-reticle::after {
      height: 1px;
      width: 100%;
      top: 50%;
      left: 0;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      animation: pulse 1.6s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(0.6); opacity: 0.9; }
      100% { transform: scale(2.0); opacity: 0; }
    }

    /* ── DIVIDER ── */
    .vs-sep {
      display: flex;
      align-items: center;
      align-self: center;
      padding-top: 10px;
    }

    .vs-line {
      width: 1px;
      height: 140px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* ── FLEET STATUS ── */
    .fleet-row {
      display: flex;
      gap: 56px;
    }

    .fleet-panel {
      width: calc(var(--cell) * 8 + 18px);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .fleet-panel-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-dim);
      margin-bottom: 10px;
    }

    .ship-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .ship-row:last-child { border-bottom: none; }

    .ship-name-col {
      width: 90px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .ship-name-col.sunk-name {
      color: var(--text-tertiary);
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.15);
    }

    .hp-bar { display: flex; gap: 3px; align-items: center; }

    .pip {
      width: 20px;
      height: 5px;
      border-radius: 2px;
    }

    .pip.live { background: var(--amber); }

    .pip.live.warn {
      background: var(--amber);
      box-shadow: 0 0 5px rgba(245,158,11,0.7);
      animation: warn-pulse 1.2s ease-in-out infinite;
    }

    @keyframes warn-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .pip.dead { background: rgba(255,255,255,0.09); }

    .pip.unknown {
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.14) 0px,
        rgba(255,255,255,0.14) 5px,
        rgba(255,255,255,0.04) 5px,
        rgba(255,255,255,0.04) 10px
      );
    }

    .sunk-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
    }

    /* ── LOCK BUTTON ── */
    .action-area {
      display: flex;
      justify-content: center;
    }

    .lock-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #000;
      background: var(--amber);
      border: none;
      border-radius: 6px;
      padding: 0 52px;
      height: 50px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 700;
      box-shadow: 0 0 28px rgba(245,158,11,0.22), 0 2px 8px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lock-btn-sep {
      width: 1px;
      height: 14px;
      background: rgba(0,0,0,0.3);
    }

    .lock-coord {
      opacity: 0.65;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="player">
      <div class="player-name">SILAS</div>
      <div class="player-tag">Your turn</div>
    </div>

    <div class="match-center">
      <div class="round-label">ROUND 7 · OF 40</div>
      <div class="timer-row">
        <div class="timer-dot"></div>
        <div class="timer-val">00:12</div>
      </div>
    </div>

    <div class="player right">
      <div class="player-name dim">THOMAS</div>
      <div class="player-tag">Waiting</div>
    </div>

    <div class="phantom-pill">Phantom Mode</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="grids-row">

      <!-- YOUR WATERS -->
      <div class="grid-section">
        <div class="grid-section-label">Your Waters</div>
        <div class="grid-wrap">
          <div class="rlabels" id="rl-left"></div>
          <div class="grid-col">
            <div class="clabels" id="cl-left"></div>
            <div class="grid" id="grid-left"></div>
          </div>
        </div>
      </div>

      <div class="vs-sep"><div class="vs-line"></div></div>

      <!-- OPPONENT'S WATERS -->
      <div class="grid-section">
        <div class="grid-section-label">Opponent's Waters</div>
        <div class="grid-wrap">
          <div class="rlabels" id="rl-right"></div>
          <div class="grid-col">
            <div class="clabels" id="cl-right"></div>
            <div class="grid" id="grid-right"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- FLEET STATUS -->
    <div class="fleet-row">

      <!-- YOUR FLEET -->
      <div class="fleet-panel">
        <div class="fleet-panel-label">Your Fleet</div>
        <div class="ship-row">
          <div class="ship-name-col">Carrier</div>
          <div class="hp-bar">
            <div class="pip live"></div>
            <div class="pip live"></div>
            <div class="pip live"></div>
            <div class="pip live"></div>
          </div>
        </div>
        <div class="ship-row">
          <div class="ship-name-col">Cruiser</div>
          <div class="hp-bar">
            <div class="pip live"></div>
            <div class="pip live"></div>
            <div class="pip live"></div>
          </div>
        </div>
        <div class="ship-row">
          <div class="ship-name-col">Destroyer</div>
          <div class="hp-bar">
            <div class="pip live"></div>
            <div class="pip live"></div>
          </div>
        </div>
        <div class="ship-row">
          <div class="ship-name-col sunk-name">Scout</div>
          <div class="sunk-tag">Sunk</div>
        </div>
      </div>

      <!-- OPPONENT FLEET -->
      <div class="fleet-panel">
        <div class="fleet-panel-label">Opponent Fleet</div>
        <div class="ship-row">
          <div class="ship-name-col">Carrier</div>
          <div class="hp-bar">
            <div class="pip live"></div>
            <div class="pip live"></div>
            <div class="pip live"></div>
            <div class="pip live"></div>
          </div>
        </div>
        <div class="ship-row">
          <div class="ship-name-col">Cruiser</div>
          <div class="hp-bar">
            <div class="pip live"></div>
            <div class="pip live"></div>
            <div class="pip live"></div>
          </div>
        </div>
        <div class="ship-row">
          <div class="ship-name-col">Destroyer</div>
          <div class="hp-bar">
            <div class="pip warn live"></div>
            <div class="pip dead"></div>
          </div>
        </div>
        <div class="ship-row">
          <div class="ship-name-col">Scout</div>
          <div class="hp-bar">
            <div class="pip unknown" style="width:74px;"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- ACTION -->
    <div class="action-area">
      <button class="lock-btn">
        Lock Shot
        <div class="lock-btn-sep"></div>
        <span class="lock-coord">C7</span>
      </button>
    </div>

  </div>

  <script>
    const COLS = ['A','B','C','D','E','F','G','H'];
    const ROWS = ['1','2','3','4','5','6','7','8'];

    // YOUR WATERS
    // col 0=A…7=H  row 0=1…7=8
    const shipCells = new Set([
      // Carrier: row 2 (idx 1), cols B-E (idx 1-4)
      '1,1','2,1','3,1','4,1',
      // Cruiser: col G (idx 6), rows 4-6 (idx 3-5)
      '6,3','6,4','6,5',
      // Destroyer: row 7 (idx 6), cols C-D (idx 2-3)
      '2,6','3,6',
    ]);

    const sunkCells = new Set([
      // Scout H8 = col 7, row 7
      '7,7',
    ]);

    const leftMisses = new Set(['0,0','2,2','5,4','7,5']);
    const leftHits   = new Set(['7,7']); // Scout sunk

    // OPPONENT'S WATERS
    const rightMisses = new Set(['0,0','1,2','3,6','5,1','6,3']);
    const rightHits   = new Set(['2,4','2,5']); // Destroyer found
    const targeted    = '2,6'; // C7

    function buildCoords(clEl, rlEl) {
      COLS.forEach(c => {
        const d = document.createElement('div');
        d.className = 'clabel';
        d.textContent = c;
        clEl.appendChild(d);
      });
      ROWS.forEach(r => {
        const d = document.createElement('div');
        d.className = 'rlabel';
        d.textContent = r;
        rlEl.appendChild(d);
      });
    }

    function buildGrid(el, isLeft) {
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const key = `${col},${row}`;
          const cell = document.createElement('div');
          cell.className = 'cell';

          if (isLeft) {
            if (sunkCells.has(key)) {
              cell.classList.add('sunk');
              const x = document.createElement('div');
              x.className = 'sunk-x';
              cell.appendChild(x);
            } else if (shipCells.has(key)) {
              cell.classList.add('ship');
              if (leftHits.has(key)) cell.classList.add('hit');
            } else if (leftMisses.has(key)) {
              const d = document.createElement('div');
              d.className = 'miss-dot';
              cell.appendChild(d);
            }
          } else {
            if (key === targeted) {
              cell.classList.add('targeted');
              const ring = document.createElement('div');
              ring.className = 'pulse-ring';
              const ret = document.createElement('div');
              ret.className = 'target-reticle';
              cell.appendChild(ring);
              cell.appendChild(ret);
            } else if (rightHits.has(key)) {
              cell.classList.add('hit-mark');
              const d = document.createElement('div');
              d.className = 'hit-dot';
              cell.appendChild(d);
            } else if (rightMisses.has(key)) {
              const d = document.createElement('div');
              d.className = 'miss-dot';
              cell.appendChild(d);
            }
          }

          el.appendChild(cell);
        }
      }
    }

    buildCoords(
      document.getElementById('cl-left'),
      document.getElementById('rl-left')
    );
    buildCoords(
      document.getElementById('cl-right'),
      document.getElementById('rl-right')
    );
    buildGrid(document.getElementById('grid-left'), true);
    buildGrid(document.getElementById('grid-right'), false);
  </script>
</body>
</html>
